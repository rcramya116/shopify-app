<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify Profit Checker</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #111827;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    text-align: center;
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: #9ca3af;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

.profit {
    background: #052e16;
    color: #22c55e;
}

.loss {
    background: #3f0d0d;
    color: #ef4444;
}

.cta {
    margin-top: 15px;
    font-size: 13px;
    color: #9ca3af;
}
</style>
</head>

<body>

<div class="container">
    <h1>Check your real profit</h1>
    <p>Most Shopify stores track revenue… not profit.</p>

    <input type="number" id="revenue" placeholder="Revenue ($)">
    <input type="number" id="ads" placeholder="Ad Spend ($)">
    <input type="number" id="cost" placeholder="Product Cost ($)">

    <button onclick="calculateProfit()">Calculate</button>

    <div id="resultBox" class="result"></div>

    <div class="cta">
        Want deeper insights? Full AI analysis coming soon 🚀
    </div>
</div>

<script>
function calculateProfit() {
    let revenue = parseFloat(document.getElementById("revenue").value) || 0;
    let ads = parseFloat(document.getElementById("ads").value) || 0;
    let cost = parseFloat(document.getElementById("cost").value) || 0;

    let profit = revenue - ads - cost;

    let resultBox = document.getElementById("resultBox");
    resultBox.style.display = "block";

    if (profit >= 0) {
        resultBox.className = "result profit";
        resultBox.innerHTML = "✅ You made $" + profit.toFixed(2) + " profit today";
    } else {
        resultBox.className = "result loss";
        resultBox.innerHTML = "❌ You lost $" + Math.abs(profit).toFixed(2) + " today";
    }
}
</script>

</body>
</html>
