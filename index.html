<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopify Profit Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1d36;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #12294a;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    .badge {
      background: orange;
      color: black;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2ecc71;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .result {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
    }

    .cta {
      margin-top: 10px;
      color: #00bfff;
      font-size: 13px;
    }

    .upgrade-btn {
      margin-top: 15px;
      background: #f1c40f;
      color: black;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="badge">⚠ Most stores are wrong</div>

  <h2>You’re probably losing money.<br>Check in 10 seconds.</h2>

  <p>Revenue ≠ Profit. Most Shopify store owners don’t realize this.</p>

  <input type="number" id="revenue" placeholder="Revenue (₹)">
  <input type="number" id="ads" placeholder="Ad Spend (₹)">
  <input type="number" id="cost" placeholder="Product Cost (₹)">

  <button onclick="calculateProfit()">Check My Profit</button>

  <div id="resultBox" class="result"></div>

  <p>This is why most Shopify stores fail.</p>

  <p class="cta">👇 Want full breakdown? Comment "CHECK"</p>

  <button class="upgrade-btn">Get full breakdown (coming soon)</button>

</div>

<script>
function calculateProfit() {

  let revenue = parseFloat(document.getElementById("revenue").value) || 0;
  let ads = parseFloat(document.getElementById("ads").value) || 0;
  let cost = parseFloat(document.getElementById("cost").value) || 0;

  let profit = revenue - ads - cost;

  const resultDiv = document.getElementById("resultBox");

  if (profit >= 0) {
    resultDiv.innerHTML = `
      <div style="color:#00ff99; font-weight:bold;">
        You THINK you made money… you actually made ₹${profit.toLocaleString()}
      </div>
      <p style="color:#ff4d4d; font-weight:bold;">
        Most Shopify store owners track revenue… not profit.
      </p>
    `;
  } else {
    resultDiv.innerHTML = `
      <div style="color:#ff4d4d; font-weight:bold;">
        You THINK you made money… you actually LOST ₹${Math.abs(profit).toLocaleString()}
      </div>
      <p style="color:#ff4d4d; font-weight:bold;">
        This is exactly why most Shopify stores fail.
      </p>
    `;
  }
}
</script>

</body>
</html>
