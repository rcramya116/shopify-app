<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Reality Check</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1b34;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #112240;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
}

h1 {
    font-size: 20px;
    margin-bottom: 10px;
}

.sub {
    color: #9ca3af;
    font-size: 14px;
    margin-bottom: 15px;
}

.badge {
    background: #f59e0b;
    color: black;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    display: inline-block;
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 15px;
}

.profit {
    background: #064e3b;
    color: #22c55e;
}

.loss {
    background: #7f1d1d;
    color: #f87171;
}

.small {
    margin-top: 10px;
    font-size: 13px;
    color: #9ca3af;
}

.upgrade-btn {
    margin-top: 10px;
    background: #facc15;
    color: black;
}

.cta {
    margin-top: 12px;
    font-size: 13px;
    color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">

    <div class="badge">⚠️ Most stores are wrong</div>

    <h1>You’re probably losing money. Check in 10 seconds.</h1>

    <p class="sub">Revenue ≠ Profit. Most Shopify owners don’t realize this.</p>

    <input type="number" id="revenue" placeholder="Revenue (₹)">
    <input type="number" id="ads" placeholder="Ad Spend (₹)">
    <input type="number" id="cost" placeholder="Product Cost (₹)">

    <button onclick="calculateProfit()">Check My Profit</button>

    <div id="resultBox" class="result"></div>

    <p class="small">This is why most Shopify stores fail.</p>

    <p class="cta">👇 Want full breakdown? Comment "CHECK"</p>

    <p class="small">Free for early users • Advanced insights coming soon 🚀</p>

    <button class="upgrade-btn">Get full breakdown (coming soon)</button>

</div>

<script>
function calculateProfit() {
    let revenue = parseFloat(document.getElementById("revenue").value) || 0;
    let ads = parseFloat(document.getElementById("ads").value) || 0;
    let cost = parseFloat(document.getElementById("cost").value) || 0;

    let profit = revenue - ads - cost;

    let resultBox = document.getElementById("resultBox");

    if (profit >= 0) {
        resultBox.className = "result profit";
        resultBox.innerHTML = "You think you made money… you actually made ₹" + profit.toFixed(2);
    } else {
        resultBox.className = "result loss";
        resultBox.innerHTML = "You think you made money… you actually LOST ₹" + Math.abs(profit).toFixed(2);
    }
}
</script>

</body>
</html>
